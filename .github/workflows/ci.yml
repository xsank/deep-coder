name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check deep_coder/ tests/

      - name: Test with coverage
        run: pytest --cov --cov-report=xml --cov-report=term -q

      - name: Generate and commit coverage badge
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.12'
        run: |
          python scripts/generate_badge.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/coverage-badge.svg
          git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
          git push
